tools:
  list_tables:
    kind: postgres-sql
    source: postgres_main
    description: List all tables in the bookreview database.
    statement: |
      SELECT table_schema, table_name
      FROM information_schema.tables
      WHERE table_schema NOT IN ('pg_catalog', 'information_schema')
      ORDER BY table_schema, table_name;

  describe_books_info:
    kind: postgres-sql
    source: postgres_main
    description: Describe columns in the books_info table.
    statement: |
      SELECT column_name, data_type
      FROM information_schema.columns
      WHERE table_schema = 'public'
        AND table_name = 'books_info'
      ORDER BY ordinal_position;

  preview_books_info:
    kind: postgres-sql
    source: postgres_main
    description: Preview rows from books_info.
    statement: |
      SELECT *
      FROM books_info
      LIMIT 10;

  run_query:
    kind: postgres-execute-sql
    source: postgres_main
    description: Execute an arbitrary SQL query against the BookReview PostgreSQL database.

  run_crm_query:
    kind: postgres-execute-sql
    source: postgres_crm
    description: Execute an arbitrary SQL query against the CRM Support PostgreSQL database.

  run_googlelocal_query:
    kind: postgres-execute-sql
    source: postgres_googlelocal
    description: Execute an arbitrary SQL query against the GoogleLocal PostgreSQL database.

  run_pancancer_query:
    kind: postgres-execute-sql
    source: postgres_pancancer
    description: Execute an arbitrary SQL query against the PanCancer Clinical PostgreSQL database.

  run_patents_query:
    kind: postgres-execute-sql
    source: postgres_patents
    description: Execute an arbitrary SQL query against the Patents CPC PostgreSQL database.

  mongodb_query:
    kind: mongodb-aggregate
    source: mongo_main
    database: articles_db
    collection: articles
    readOnly: true
    description: |
      Execute a MongoDB aggregation pipeline against articles_db.articles.
      The `pipeline` parameter must be a JSON array of aggregation stages.
    pipelinePayload: |
      {{.pipeline}}
    pipelineParams:
      - name: pipeline
        type: string
        description: MongoDB aggregation pipeline as a JSON array string.

  mongodb_query_yelp_business:
    kind: mongodb-aggregate
    source: mongo_main
    database: yelp_db
    collection: business
    readOnly: true
    description: |
      Execute a MongoDB aggregation pipeline against yelp_db.business.
      The `pipeline` parameter must be a JSON array of aggregation stages.
    pipelinePayload: |
      {{.pipeline}}
    pipelineParams:
      - name: pipeline
        type: string
        description: MongoDB aggregation pipeline as a JSON array string.

  mongodb_query_yelp_checkin:
    kind: mongodb-aggregate
    source: mongo_main
    database: yelp_db
    collection: checkin
    readOnly: true
    description: |
      Execute a MongoDB aggregation pipeline against yelp_db.checkin.
      The `pipeline` parameter must be a JSON array of aggregation stages.
    pipelinePayload: |
      {{.pipeline}}
    pipelineParams:
      - name: pipeline
        type: string
        description: MongoDB aggregation pipeline as a JSON array string.

  sqlite_bookreview_query:
    kind: sqlite-execute-sql
    source: sqlite_bookreview
    description: Execute SQL against the BookReview SQLite review database.

  sqlite_googlelocal_query:
    kind: sqlite-execute-sql
    source: sqlite_googlelocal
    description: Execute SQL against the GoogleLocal SQLite review database.

  sqlite_agnews_query:
    kind: sqlite-execute-sql
    source: sqlite_agnews
    description: Execute SQL against the AG News SQLite metadata database.

  sqlite_crm_core_query:
    kind: sqlite-execute-sql
    source: sqlite_crm_core
    description: Execute SQL against the CRM Arena Pro core SQLite database.

  sqlite_crm_products_query:
    kind: sqlite-execute-sql
    source: sqlite_crm_products
    description: Execute SQL against the CRM Arena Pro products/orders SQLite database.

  sqlite_crm_territory_query:
    kind: sqlite-execute-sql
    source: sqlite_crm_territory
    description: Execute SQL against the CRM Arena Pro territory SQLite database.

  # Tools for new databases
  sqlite_patents_query:
    kind: sqlite-execute-sql
    source: sqlite_patents
    description: Execute SQL against the Patents SQLite database.

  run_business_query:
    kind: postgres-execute-sql
    source: postgres_business
    description: Execute an arbitrary SQL query against the Business Database.

  run_clinical_query:
    kind: postgres-execute-sql
    source: postgres_clinical
    description: Execute an arbitrary SQL query against the Clinical Database.

